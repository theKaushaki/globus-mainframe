<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | The Shadow Protocol</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background: #090909 !important; color: #d7d0c7 !important; font-family: 'Lora', serif; padding-bottom: 100px; }

        .custom-navbar { background: rgba(9, 9, 9, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(176,141,87,.15) !important; padding: 15px 0; transition: transform 0.4s ease-in-out; }
        .navbar-brand { font-family: 'Lora', serif !important; color: #d7d0c7 !important; font-size: 1.1rem !important; text-transform: uppercase; letter-spacing: .15em; text-decoration: none; }
        .custom-nav-link { font-family: 'Lora', serif; color: #d7d0c7 !important; font-size: 1.1rem; text-transform: uppercase; letter-spacing: .15em; padding: 8px 15px !important; text-decoration: none; }
        .custom-nav-link:hover, .navbar-brand:hover { color: #b08d57 !important; transform: translateY(-2px); }

        .stat-box { background: rgba(176,141,87,.03); border: 1px solid rgba(176,141,87,.18); padding: 30px; border-radius: 4px; text-align: center; height: 100%; backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(176,141,87,.04); }
        .stat-number { font-size: 2.5rem; color: #d8c7a2; font-weight: 600; font-family: 'Cinzel Decorative', serif; }
        .stat-label { text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; color: #8f887d; margin-top: 5px; }
        
        .chart-container { background: rgba(176,141,87,.02); border: 1px solid rgba(176,141,87,.15); padding: 25px; border-radius: 4px; height: 100%; }
        .chart-title { font-family: 'Cinzel Decorative', serif; color: #b08d57; text-align: center; margin-bottom: 20px; font-size: 1.3rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md custom-navbar fixed-top" id="main-nav">
  <div class="container">
    <a href="index.html" class="navbar-brand">The Shadow Protocol</a>
    <button class="navbar-toggler shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#base-navbars">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="base-navbars">
      <ul class="navbar-nav mx-auto w-100 justify-content-evenly mt-3 mt-md-0">
        <li class="nav-item"><a class="nav-link custom-nav-link" href="challenges.html">Their Story</a></li>
        <li class="nav-item"><a class="nav-link custom-nav-link" href="scoreboard.html">Scoreboard</a></li>
        <li class="nav-item"><a class="nav-link custom-nav-link" href="analytics.html">Analytics</a></li>
        </ul>
    </div>
  </div>
</nav>

<div class="container" style="margin-top: 130px;">
    
    <div class="row mb-5 text-center">
        <div class="col-12">
            <h2 style="font-family: 'Cinzel Decorative', serif; color: #b08d57; font-size: 2.5rem; letter-spacing: 2px;">Mainframe Telemetry</h2>
            <p style="color: #8f887d; font-style: italic;">Final archived statistics from the Globus servers.</p> 
            <hr style="border-top: 1px solid rgba(176,141,87,.3); width: 20%; margin: 15px auto;">
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4"><div class="stat-box"><div class="stat-number">214</div><div class="stat-label">Total Operatives</div></div></div>
        <div class="col-md-4"><div class="stat-box"><div class="stat-number">82</div><div class="stat-label">Syndicates</div></div></div>
        <div class="col-md-4"><div class="stat-box"><div class="stat-number">8,558</div><div class="stat-label">Total Submissions</div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="chart-container">
                <div class="chart-title">Bypasses per Node</div>
                <canvas id="solveChart"></canvas>
            </div>
        </div>
        <div class="col-md-4">
            <div class="chart-container">
                <div class="chart-title">Access Outcomes</div>
                <canvas id="outcomeChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div style="margin-top:100px; color:#5c554d; font-size:.8rem; text-align:center; letter-spacing:.18em; text-transform:uppercase; font-family:sans-serif;">
        Globus Electronics Ltd.<br><br>
        All Rights Reserved. 
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    Chart.defaults.color = '#8f887d';
    Chart.defaults.font.family = "'Lora', serif";

    new Chart(document.getElementById('solveChart'), {
        type: 'bar',
        data: {
            labels: ["There Was", "No Salvation", "Neither In Gold", "Nor In Power", "Except The Thought", "Of You", "During The Time Of", "The Rise of Globus", "And The Fall Of Me"],
            datasets: [{
                data: [46, 45, 20, 14, 5, 5, 5, 5, 4],
                backgroundColor: 'rgba(176, 141, 87, 0.6)'
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });

    new Chart(document.getElementById('outcomeChart'), {
        type: 'doughnut',
        data: {
            labels: ['Denied', 'Granted'],
            datasets: [{
                data: [8409, 149],
                backgroundColor: ['rgba(200, 50, 50, 0.4)', 'rgba(176, 141, 87, 0.8)']
            }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
    });
</script>
<script>
      let lastScrollTop = 0;
      const navbar = document.getElementById('main-nav');

      window.addEventListener('scroll', function() {
          let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          
          if (scrollTop > lastScrollTop && scrollTop > 80) {
              navbar.style.transform = 'translateY(-100%)'; 
          } else {
              navbar.style.transform = 'translateY(0)'; 
          }
          lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; 
      });
  </script>

</body>
</html>
